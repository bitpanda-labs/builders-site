layout: default
title: Bitpanda Builders — Coming soon
description: Something for builders is on its way.
---

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Bitpanda brand palette */
    --bp-green:       #2cec9a;              /* primary green */
    --bp-green-soft:  rgba(44, 236, 154, 0.6);
    --bp-teal:        #103e36;              /* brand teal (RGB 16 62 54) */
    --bp-black:       #000000;              /* brand black */
    --bp-grey:        #b2b2b2;              /* brand neutral grey (RGB 178) */

    --bg:             var(--bp-black);
    --bg-nav:         rgba(0, 0, 0, 0.7);
    --border:         rgba(255, 255, 255, 0.06);
    --text:           #F2F2F5;
    --text-muted:     var(--bp-grey);
    --nav-h:          56px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ---- Layered animated aurora backdrop ---- */
  .aurora {
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
    filter: blur(10px);
  }
  .aurora span {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
    opacity: 0.55;
    will-change: transform;
  }
  .aurora .a1 {
    width: 60vw; height: 60vw;
    top: -20%; left: -10%;
    background: radial-gradient(circle, rgba(44,236,154,0.32) 0%, transparent 60%);
    animation: drift1 22s ease-in-out infinite;
  }
  .aurora .a2 {
    width: 50vw; height: 50vw;
    bottom: -25%; right: -10%;
    background: radial-gradient(circle, rgba(16,62,54,0.85) 0%, transparent 60%);
    animation: drift2 28s ease-in-out infinite;
  }
  .aurora .a3 {
    width: 40vw; height: 40vw;
    top: 30%; left: 45%;
    background: radial-gradient(circle, rgba(16,62,54,0.55) 0%, transparent 60%);
    animation: drift3 25s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(12vw, 10vh) scale(1.15); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0) scale(1.1); }
    50%     { transform: translate(-14vw, -8vh) scale(1); }
  }
  @keyframes drift3 {
    0%,100% { transform: translate(-50%, 0) scale(1); }
    50%     { transform: translate(-40%, -12vh) scale(1.2); }
  }

  /* ---- Fine grid + vignette for depth ---- */
  .grid-overlay {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(circle at 50% 45%, black 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(circle at 50% 45%, black 0%, transparent 75%);
  }
  .vignette {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(circle at 50% 45%, transparent 40%, rgba(0,0,0,0.85) 100%);
  }

  /* ---- Header: hidden on the coming-soon page for a clean full-screen look ---- */
  header { display: none; }

  /* ---- Center stage ---- */
  main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 28px;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--bp-green);
    padding: 7px 16px; border-radius: 999px;
    background: rgba(44, 236, 154, 0.06);
    border: 1px solid rgba(44, 236, 154, 0.22);
    margin-bottom: 34px;
    opacity: 0;
    animation: rise 0.9s 0.1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--bp-green);
    box-shadow: 0 0 0 0 var(--bp-green-soft);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 var(--bp-green-soft); }
    70%  { box-shadow: 0 0 0 8px rgba(44, 236, 154, 0); }
    100% { box-shadow: 0 0 0 0 rgba(44, 236, 154, 0); }
  }

  h1 {
    font-size: clamp(44px, 9vw, 96px);
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 1.02;
    margin-bottom: 22px;
    opacity: 0;
    animation: rise 1s 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  /* Shimmering gradient sweep across the headline */
  h1 .shine {
    background: linear-gradient(
      100deg,
      #ffffff 0%, #ffffff 35%,
      var(--bp-green) 50%,
      #ffffff 65%, #ffffff 100%
    );
    background-size: 250% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: shimmer 6s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 150% 0; }
    50%  { background-position: -50% 0; }
    100% { background-position: 150% 0; }
  }

  .lead {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 460px;
    line-height: 1.7;
    opacity: 0;
    animation: rise 1s 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .aurora span, .badge .dot, h1 .shine { animation: none; }
    .badge, h1, .lead { animation: none; opacity: 1; }
    h1 .shine { -webkit-text-fill-color: #fff; color: #fff; }
  }

  /* Discreet unlock link — barely visible until hovered */
  .unlock {
    position: fixed;
    bottom: 22px; right: 24px;
    z-index: 20;
    font-size: 12px; letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.14);
    text-decoration: none;
    transition: color 0.25s ease;
  }
  .unlock:hover { color: var(--bp-green); }
</style>

<div class="aurora">
  <span class="a1"></span>
  <span class="a2"></span>
  <span class="a3"></span>
</div>
<div class="grid-overlay"></div>
<div class="vignette"></div>

<main>
  <div class="badge"><span class="dot"></span> Coming soon</div>
  <h1><span class="shine">Something new is coming.</span></h1>
  <p class="lead">A new home for builders at Bitpanda is on its way.</p>
</main>

<a href="{{ '/home/' | relative_url }}" class="unlock" rel="nofollow">Enter →</a>
