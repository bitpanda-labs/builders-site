title: Bitpanda Builders
description: >-
  Documentation and tools for developers and AI builders connecting to Bitpanda.
# Temporary: served on the GitHub Pages project domain until builders.bitpanda.com is mapped.
url: "https://bitpanda-labs.github.io"
baseurl: "/builders-site"

plugins:
  - jekyll-feed
  - jekyll-sitemap

include:
  - assets
  - favicon.svg
  - robots.txt

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/
