<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bp-green:        #2cec9a;
      --bp-green-dim:    #20d488;
      --bp-green-faint:  rgba(44, 236, 154, 0.07);
      --bp-green-border: rgba(44, 236, 154, 0.2);
      --bp-teal:         #103e36;
      --bp-teal-light:   #174f44;

      --bg:          #000000;
      --bg-nav:      rgba(0, 0, 0, 0.92);
      --bg-sidebar:  #0A0A0C;
      --bg-surface:  #121215;
      --bg-surface2: #1A1A1F;
      --bg-code:     #0E0E12;
      --border:      #222228;
      --border-soft: #1A1A1F;
      --text:        #F2F2F5;
      --text-muted:  #b2b2b2;
      --text-faint:  #44444F;

      --nav-h:       56px;
      --sidebar-w:   240px;
      --toc-w:       220px;
      --content-max: 720px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 14.5px;
    }

    header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200; height: var(--nav-h);
      background: var(--bg-nav); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 28px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text);
      font-weight: 700; font-size: 15px; letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .nav-logo img { height: 32px; width: auto; flex-shrink: 0; }
    .nav-spacer { flex: 1; }
    .nav-link {
      font-size: 13.5px; color: var(--text-muted);
      text-decoration: none; padding: 6px 12px; border-radius: 7px;
      transition: all 0.15s;
    }
    .nav-link:hover { color: var(--text); background: var(--bg-surface); text-decoration: none; }

    .layout { display: flex; padding-top: var(--nav-h); min-height: 100vh; }

    .sidebar {
      position: fixed; top: var(--nav-h); left: 0;
      width: var(--sidebar-w); height: calc(100vh - var(--nav-h));
      overflow-y: auto; padding: 24px 0 40px;
      border-right: 1px solid var(--border-soft);
      background: var(--bg-sidebar);
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .sb-group { margin-bottom: 22px; }
    .sb-links { list-style: none; }
    .sb-links a {
      display: flex; align-items: center; padding: 5px 16px;
      font-size: 13.5px; color: var(--text-muted); text-decoration: none;
      transition: color 0.12s, background 0.12s;
      border-left: 2px solid transparent; margin: 1px 0;
    }
    .sb-links a:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .sb-links a.active { color: var(--bp-green); background: var(--bp-green-faint); border-left-color: var(--bp-green); font-weight: 500; }

    .content-wrap { flex: 1; margin-left: var(--sidebar-w); margin-right: var(--toc-w); min-width: 0; }
    .content { max-width: var(--content-max); margin: 0 auto; padding: 44px 40px 96px; }

    .toc {
      position: fixed; top: var(--nav-h); right: 0;
      width: var(--toc-w); height: calc(100vh - var(--nav-h));
      overflow-y: auto; padding: 32px 20px 40px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .toc-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text-faint); margin-bottom: 14px;
    }
    .toc-list { list-style: none; }
    .toc-list li { margin: 2px 0; }
    .toc-list a {
      display: flex; align-items: center; gap: 8px;
      font-size: 12.5px; color: var(--text-faint);
      text-decoration: none; padding: 3px 0; transition: color 0.12s; line-height: 1.4;
    }
    .toc-list a::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      border: 1px solid var(--text-faint); flex-shrink: 0; transition: all 0.12s;
    }
    .toc-list a:hover { color: var(--text-muted); text-decoration: none; }
    .toc-list a:hover::before { border-color: var(--text-muted); }
    .toc-list a.active { color: var(--bp-green); font-weight: 500; }
    .toc-list a.active::before { background: var(--bp-green); border-color: var(--bp-green); }

    .breadcrumb { font-size: 12px; color: var(--bp-green); font-weight: 500; letter-spacing: 0.02em; margin-bottom: 14px; scroll-margin-top: calc(var(--nav-h) + 32px); }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.18; color: #fff; margin-bottom: 14px; }
    .page-lead { font-size: 16px; line-height: 1.7; color: var(--text-muted); margin-bottom: 36px; max-width: 580px; }
    .page-divider { height: 1px; background: var(--border); margin: 36px 0; scroll-margin-top: calc(var(--nav-h) + 32px); }
    h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: #fff; margin: 40px 0 14px; scroll-margin-top: calc(var(--nav-h) + 20px); }
    h3 { font-size: 11px; font-weight: 700; color: var(--text-faint); margin: 22px 0 8px; letter-spacing: 0.06em; text-transform: uppercase; }
    p { color: var(--text-muted); margin-bottom: 14px; line-height: 1.7; }
    p:last-child { margin-bottom: 0; }
    a { color: var(--bp-green); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .callout {
      display: flex; gap: 12px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px; margin: 22px 0;
      font-size: 13.5px; color: var(--text-muted); line-height: 1.6;
    }
    .callout-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; opacity: 0.6; }
    .callout.green { border-color: var(--bp-green-border); background: var(--bp-green-faint); }
    .callout.warning { border-color: rgba(251,191,36,0.25); background: rgba(251,191,36,0.05); }
    .callout strong { color: var(--text); }

    .tab-group { margin: 22px 0; }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .tab {
      padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text-muted);
      cursor: pointer; border: none; background: transparent;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--bp-green); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .code-block { background: var(--bg-code); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: 12px 0; }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 16px; background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 11.5px; font-weight: 600; color: var(--text-faint); letter-spacing: 0.04em;
    }
    .copy-btn {
      background: var(--bg-surface2); border: 1px solid var(--border); color: var(--text-faint);
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 5px; cursor: pointer; transition: all 0.15s;
    }
    .copy-btn:hover { color: var(--text-muted); border-color: #333340; }
    .copy-btn.copied { color: var(--bp-green); border-color: var(--bp-green-border); }
    pre { padding: 18px 20px; overflow-x: auto; font-size: 13px; line-height: 1.75; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    code { font-family: "Berkeley Mono","SF Mono","Fira Code",Consolas,monospace; color: var(--text); }
    p code, li code, td code { background: var(--bg-surface2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; font-size: 12px; color: #C8C8E0; }

    .steps { list-style: none; counter-reset: steps; margin: 18px 0; }
    .steps > li { counter-increment: steps; display: flex; gap: 14px; margin-bottom: 18px; align-items: flex-start; }
    .steps > li::before {
      content: counter(steps); width: 24px; height: 24px;
      background: var(--bp-teal); border: 1px solid var(--bp-teal-light); border-radius: 50%;
      color: var(--bp-green); font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .steps > li div { flex: 1; }
    .steps > li > div > strong:first-child { display: block; color: var(--text); margin-bottom: 3px; font-size: 14px; }
    .steps > li p { margin: 0; font-size: 13.5px; }
    .steps > li p strong { color: inherit; font-weight: inherit; }

    .table-wrap { overflow-x: auto; margin: 16px 0; border: 1px solid var(--border); border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--bg-surface); }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-faint); border-bottom: 1px solid var(--border); }
    td { padding: 10px 14px; border-bottom: 1px solid var(--border-soft); color: var(--text-muted); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.015); }
    .badge { display: inline-block; font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .badge-green { background: var(--bp-teal); color: var(--bp-green); border: 1px solid var(--bp-teal-light); }
    .badge-gray  { background: var(--bg-surface2); color: var(--text-faint); border: 1px solid var(--border); }

    .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
    .tool-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: border-color 0.15s; }
    .tool-card:hover { border-color: var(--bp-green-border); }
    .tool-card-name { font-family: "Berkeley Mono","SF Mono",Consolas,monospace; font-size: 12.5px; font-weight: 600; color: var(--bp-green); margin-bottom: 6px; }
    .tool-card-tag { float: right; font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: var(--bp-teal); color: var(--bp-green); border: 1px solid var(--bp-teal-light); margin-left: 8px; margin-top: 1px; }
    .tool-card p { font-size: 12.5px; color: var(--text-muted); margin: 0; line-height: 1.5; }

    details { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    summary { padding: 14px 18px; font-weight: 600; font-size: 14px; color: var(--text); cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 10px; transition: background 0.12s; }
    summary::-webkit-details-marker { display: none; }
    summary::after { content: '+'; margin-left: auto; font-size: 18px; font-weight: 400; color: var(--text-faint); line-height: 1; }
    details[open] summary::after { content: '−'; color: var(--bp-green); }
    summary:hover { background: rgba(255,255,255,0.02); }
    details[open] summary { border-bottom: 1px solid var(--border); }
    .faq-body { padding: 14px 18px; font-size: 13.5px; color: var(--text-muted); line-height: 1.7; }
    .faq-body p { margin-bottom: 8px; }
    .faq-body p:last-child { margin-bottom: 0; }

    @media (max-width: 1100px) { .toc { display: none; } .content-wrap { margin-right: 0; } }
    @media (max-width: 768px) { .sidebar { display: none; } .content-wrap { margin-left: 0; } .content { padding: 32px 20px 64px; } h1 { font-size: 26px; } .tools-grid { grid-template-columns: 1fr; } }
  </style>
